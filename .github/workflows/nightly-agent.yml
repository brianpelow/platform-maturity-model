name: Nightly agent
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Run self-assessment
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: uv run python scripts/nightly_agent.py
      - name: Commit assessment
        run: |
          git config user.name "platform-maturity-agent[bot]"
          git config user.email "bpelow7@gmail.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore(agent): nightly self-assessment $(date -u +%Y-%m-%d)"
          git push